name: testing

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code into the Go module directory
        # https://github.com/actions/checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
        id: go
      - name: Get dependencies
        run: |
          go mod download
          sudo apt-get install -y xorriso
      - name: Build
        run: |
          go build -v .
  unit:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        # https://github.com/actions/checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
      - run: go test -v -cover ./...
  test:
    name: Integration Tests (${{ matrix.tool }} / Cobbler ${{ matrix.cobbler_version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool:
          - terraform
          - opentofu
        cobbler_version:
          # - d8f60bbf14a838c8c8a1dba98086b223e35fe70a # 3.3.0 - TypeError during import
          - f5b0599acce32de4288c76e4f601aece0c664fed # 3.3.1
          # - 9044aa990a94752fa5bd5a24051adde099280bfa # 3.3.2 - Testing Docker Image broken
          # - 5c498dbf2af6e3782b37605a477759e1aacc16b2 # 3.3.3 - Testing Docker Image broken
          # - 3ed865b79ce69fca7464e0957f4bcadcc9917a9d # 3.3.4 - Testing Docker Image broken
          - 718e3256a5989941e8a678404fdea07364255637 # 3.3.5
          - df356046f3cf27be62a61001b982d5983800cfd9 # 3.3.6
          - 758143e06c422caa411d9d37b8f90d0419625e90 # 3.3.7
      fail-fast: false
    steps:
      - name: Check out code into the Go module directory
        # https://github.com/actions/checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
        id: go
      - name: Set up Terraform
        if: matrix.tool == 'terraform'
        # https://github.com/hashicorp/setup-terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: Set up OpenTofu
        if: matrix.tool == 'opentofu'
        # https://github.com/opentofu/setup-opentofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      - name: Export TF_ACC_TERRAFORM_PATH for OpenTofu
        if: matrix.tool == 'opentofu'
        run: echo "TF_ACC_TERRAFORM_PATH=$(which tofu)" >> "$GITHUB_ENV"
      - name: Install system dependencies
        run: |
          sudo apt-get install -y xorriso
      - name: Get dependencies
        run: |
          go mod download
      - name: Replace git version hash
        run: |
          sed -i "s/cobbler_commit=.*/cobbler_commit=${{ matrix.cobbler_version }}/" docker/start.sh
      - name: Restore OS ISO
        id: cache-iso-restore
        # https://github.com/actions/cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            *.iso
          key: ${{ runner.os }}-${{ matrix.cobbler_version }}-iso
      - name: Make Test
        env:
          TF_ACC_PROVIDER_NAMESPACE: cobbler
        run: |
          make testacc
      - name: Save OS ISO
        id: cache-iso-save
        # https://github.com/actions/cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            *.iso
          key: ${{ steps.cache-iso-restore.outputs.cache-primary-key }}
      - name: Upload coverage report to GH artifacts
        if: matrix.cobbler_version == '758143e06c422caa411d9d37b8f90d0419625e90' && matrix.tool == 'terraform'
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error
