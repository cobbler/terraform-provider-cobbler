name: testing

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
        id: go
      - name: Get dependencies
        run: |
          go mod download
          sudo apt-get install -y xorriso
      - name: Build
        run: |
          go build -v .
  unit:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go test -v -cover ./...
  test:
    name: Integration Tests (${{ matrix.tool }} / Cobbler ${{ matrix.cobbler_version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool:
          - terraform
          - opentofu
        cobbler_version:
          - TODO_4_0_X_COMMIT # 4.0.x — fill in the commit hash
      fail-fast: false
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
        id: go
      - name: Set up Terraform
        if: matrix.tool == 'terraform'
        # https://github.com/hashicorp/setup-terraform
        uses: hashicorp/setup-terraform@v4
      - name: Set up OpenTofu
        if: matrix.tool == 'opentofu'
        uses: opentofu/setup-opentofu@v2
      - name: Export TF_ACC_TERRAFORM_PATH for OpenTofu
        if: matrix.tool == 'opentofu'
        run: echo "TF_ACC_TERRAFORM_PATH=$(which tofu)" >> "$GITHUB_ENV"
      - name: Install system dependencies
        run: |
          sudo apt-get install -y xorriso
      - name: Get dependencies
        run: |
          go mod download
      - name: Replace git version hash
        run: |
          sed -i "s/cobbler_commit=.*/cobbler_commit=${{ matrix.cobbler_version }}/" docker/start.sh
      - name: Restore OS ISO
        id: cache-iso-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            *.iso
          key: ${{ runner.os }}-${{ matrix.cobbler_version }}-iso
      - name: Make Test
        env:
          TF_ACC_PROVIDER_NAMESPACE: cobbler
        run: |
          make testacc
      - name: Save OS ISO
        id: cache-iso-save
        uses: actions/cache/save@v5
        with:
          path: |
            *.iso
          key: ${{ steps.cache-iso-restore.outputs.cache-primary-key }}
      # https://github.com/actions/upload-artifact
      - name: Upload coverage report to GH artifacts
        if: matrix.cobbler_version == 'TODO_4_0_X_COMMIT' && matrix.tool == 'terraform'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error
